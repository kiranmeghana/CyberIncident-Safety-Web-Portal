{% extends 'base1.html' %}
{% load i18n %}
{% block content %}

<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-[2rem] shadow-2xl border border-slate-100 text-center">
        <i class="fa-solid fa-envelope-circle-check text-5xl text-blue-700 mb-6 animate-pulse"></i>

        <h2 class="logo-font text-2xl font-black text-slate-900 mb-2 tracking-tighter uppercase">
            {% blocktranslate %}Identity <span class="text-blue-700">Verification</span>{% endblocktranslate %}
        </h2>

        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-8">
            {% translate "Enter the 6-digit code sent to your email" %}
        </p>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <input
                name="otp"
                maxlength="6"
                required
                placeholder="{% translate '000000' %}"
                class="w-full text-center text-3xl tracking-[0.5em] px-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 outline-none font-black text-slate-700 transition-all"
            >
            
            <button
                type="submit"
                class="w-full btn-glow text-white font-black py-4 rounded-xl uppercase tracking-widest text-sm"
            >
                {% translate "Verify & Activate" %}
            </button>
        </form>
    </div>
</div>

{% endblock %}
