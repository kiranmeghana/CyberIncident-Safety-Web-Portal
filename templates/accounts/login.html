{% extends 'base1.html' %}
{% block content %}
<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2rem] shadow-2xl glow-border relative overflow-hidden">
        <i class="fa-solid fa-lock-keyhole absolute -top-10 -left-10 text-9xl text-slate-50 opacity-[0.05]"></i>

        <div class="text-center relative">
            <h2 class="logo-font text-3xl font-black text-slate-900 tracking-tighter">SECURE <span class="text-blue-700">LOGIN</span></h2>
            <p class="mt-2 text-xs font-bold text-slate-500 uppercase tracking-widest">Defence Personnel & Public Access</p>
        </div>
        
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div class="relative">
                    <i class="fa-solid fa-user-shield absolute left-4 top-4 text-slate-400"></i>
                    <input name="username" type="text" required class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium transition-all" placeholder="Username">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-key absolute left-4 top-4 text-slate-400"></i>
                    <input name="password" type="password" required class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium transition-all" placeholder="Password">
                </div>
            </div>

            <div class="flex items-center justify-between text-xs font-bold uppercase tracking-tight">
                <a href="#" class="text-slate-400 hover:text-blue-600 transition">Reset Password</a>
                <a href="/signup" class="text-blue-600 hover:underline">Create Account</a>
            </div>

            <button type="submit" class="w-full btn-glow text-white font-black py-4 rounded-xl uppercase tracking-[0.2em] text-sm flex items-center justify-center gap-3">
                <i class="fa-solid fa-fingerprint text-lg"></i> Authenticate
            </button>
        </form>

        <div class="relative my-8">
            <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-100"></div></div>
            <div class="relative flex justify-center text-[10px] font-black uppercase tracking-[0.3em] text-slate-400"><span class="px-4 bg-white">Emergency Access</span></div>
        </div>

        <div class="text-center">
            <a href="/report?anonymous=true" class="group inline-flex items-center justify-center w-full py-4 px-4 border-2 border-blue-700 text-blue-700 font-black rounded-xl hover:bg-blue-700 hover:text-white transition-all uppercase tracking-widest text-xs gap-3">
                <i class="fa-solid fa-mask group-hover:animate-bounce"></i> Report Anonymously
            </a>
            <p class="mt-3 text-[10px] text-slate-400 font-medium uppercase tracking-tighter">Identity protection enabled by default.</p>
        </div>
    </div>
</div>
{% endblock %}
