{% extends 'base1.html' %}
{% load i18n %}
{% block content %}

<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full text-center bg-white p-12 rounded-[2rem] shadow-2xl border border-red-100">
        <i class="fa-solid fa-triangle-exclamation text-6xl text-red-500 mb-6"></i>

        <h1 class="logo-font text-2xl font-black text-slate-900 mb-4 tracking-tighter uppercase">
            {% blocktranslate %}Verification <span class="text-red-600">Failed</span>{% endblocktranslate %}
        </h1>

        <p class="text-sm font-bold text-slate-500 uppercase leading-relaxed mb-8">
            {% translate "The code is invalid or has expired. Security protocols require a retry." %}
        </p>
        
        <a href="{% url 'signup' %}"
           class="bg-slate-900 text-white px-10 py-4 rounded-xl font-black uppercase tracking-widest text-sm inline-block hover:bg-slate-800 transition">
            {% translate "Restart Registration" %}
        </a>
    </div>
</div>

{% endblock %}
