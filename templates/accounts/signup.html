{% extends 'base1.html' %}
{% block content %}
<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-[2rem] shadow-2xl glow-border relative">
        <div class="text-center">
            <h2 class="logo-font text-3xl font-black text-slate-900 tracking-tighter">JOIN <span class="text-blue-700">NETWORK</span></h2>
            <p class="mt-2 text-xs font-bold text-slate-500 uppercase tracking-widest">Register for full cyber awareness [cite: 68]</p>
        </div>

        <form class="mt-8 space-y-5" method="POST">
            {% csrf_token %}
            <div class="space-y-4">
                <div class="relative">
                    <i class="fa-solid fa-id-card absolute left-4 top-4 text-slate-400"></i>
                    <input name="username" type="text" required class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium" placeholder="Full Name / Handle">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-envelope absolute left-4 top-4 text-slate-400"></i>
                    <input name="email" type="email" required class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium" placeholder="Verification Email">
                </div>
                <div class="relative">
                    <i class="fa-solid fa-shield-keyhole absolute left-4 top-4 text-slate-400"></i>
                    <input name="password" type="password" required class="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none font-medium" placeholder="Security Password">
                </div>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 flex items-start gap-3">
                <i class="fa-solid fa-circle-info text-blue-600 mt-1"></i>
                <p class="text-[10px] text-blue-800 font-bold leading-tight uppercase tracking-tight">
                    By clicking register, an automated verification link will be sent to your inbox via secure SMTP.
                </p>
            </div>

            <button type="submit" class="w-full btn-glow text-white font-black py-4 rounded-xl uppercase tracking-[0.2em] text-sm flex items-center justify-center gap-3">
                <i class="fa-solid fa-paper-plane"></i> Register & Verify
            </button>
        </form>
        
        <p class="text-center text-xs font-bold text-slate-500 uppercase">
            Already a member? <a href="/login" class="text-blue-700 hover:underline">Sign In</a>
        </p>
    </div>
</div>
{% endblock %}
