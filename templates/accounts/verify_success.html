{% extends 'base1.html' %}
{% load i18n %}
{% block content %}

<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full text-center bg-white p-12 rounded-[2rem] shadow-2xl border border-slate-100">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-check text-4xl"></i>
        </div>

        <h1 class="logo-font text-2xl font-black text-slate-900 mb-4 tracking-tighter uppercase">
            {% blocktranslate %}Access <span class="text-green-600">Granted</span>{% endblocktranslate %}
        </h1>

        <p class="text-sm font-bold text-slate-500 uppercase leading-relaxed mb-8">
            {% translate "Your account has been successfully verified in the cyber defense network." %}
        </p>
        
        <a href="{% url 'login' %}"
           class="btn-glow text-white px-10 py-4 rounded-xl font-black uppercase tracking-widest text-sm inline-block">
            {% translate "Go to Dashboard" %}
        </a>
    </div>
</div>

{% endblock %}
