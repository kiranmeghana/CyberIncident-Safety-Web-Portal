{% extends 'base1.html' %}
{% load i18n %}
{% block content %}

<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-[2rem] shadow-2xl border border-slate-100">

        <h1 class="logo-font text-2xl font-black text-center mb-2 tracking-tighter uppercase text-slate-900">
            {% blocktranslate %}Reset <span class="text-blue-700">Access</span>{% endblocktranslate %}
        </h1>

        <p class="text-[10px] font-black text-slate-400 text-center mb-8 uppercase tracking-widest">
            {% translate "Emergency credential recovery" %}
        </p>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="text-[10px] font-black uppercase text-slate-500 ml-1">
                    {% translate "Registered Email" %}
                </label>
                <input
                    type="email"
                    name="email"
                    required
                    placeholder="{% translate 'admin@defence.gov' %}"
                    class="w-full mt-1 px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                >
            </div>

            <button
                type="submit"
                class="w-full btn-glow text-white font-black py-4 rounded-xl uppercase tracking-widest text-sm mt-4">
                {% translate "Send Recovery Link" %}
            </button>
        </form>

    </div>
</div>

{% endblock %}
