{% extends 'base1.html' %}
{% load i18n %}
{% block content %}

<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full bg-white p-12 rounded-[2rem] shadow-2xl border border-slate-100 text-center">
        <i class="fa-solid fa-paper-plane text-5xl text-blue-600 mb-6"></i>

        <h1 class="logo-font text-2xl font-black mb-3 uppercase tracking-tighter">
            {% blocktranslate %}Link <span class="text-blue-700">Dispatched</span>{% endblocktranslate %}
        </h1>

        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">
            {% translate "Check your encrypted inbox for further instructions." %}
        </p>

        <a href="{% url 'login' %}"
           class="mt-8 inline-block text-sm font-black text-blue-700 uppercase hover:underline">
            {% translate "Return to Portal" %}
        </a>
    </div>
</div>

{% endblock %}
