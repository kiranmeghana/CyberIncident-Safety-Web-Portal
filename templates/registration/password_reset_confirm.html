{% extends 'base1.html' %}
{% load i18n %}
{% block content %}

<div class="flex items-center justify-center py-20 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-[2rem] shadow-2xl border border-slate-100">
        <h1 class="logo-font text-2xl font-black mb-2 text-center tracking-tighter uppercase">
            {% blocktranslate %}New <span class="text-blue-700">Credentials</span>{% endblocktranslate %}
        </h1>
        
        <form method="post" class="space-y-6 mt-8" id="passwordForm">
            {% csrf_token %}

            <div class="space-y-4">
                <input
                    type="password"
                    name="new_password1"
                    id="id_new_password1"
                    required
                    placeholder="{% translate 'New Security Key' %}"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"
                >
                
                <div class="bg-slate-50 p-4 rounded-xl">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">
                        {% translate "Protocol Requirements" %}
                    </p>
                    <ul class="text-[10px] font-black uppercase space-y-1">
                        <li id="length" class="text-slate-400">
                            <i class="fa-solid fa-circle-check mr-2"></i>
                            {% translate "8+ Characters" %}
                        </li>
                        <li id="uppercase" class="text-slate-400">
                            <i class="fa-solid fa-circle-check mr-2"></i>
                            {% translate "Uppercase Letter" %}
                        </li>
                    </ul>
                </div>

                <input
                    type="password"
                    name="new_password2"
                    id="id_new_password2"
                    required
                    placeholder="{% translate 'Confirm Key' %}"
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none"
                >
            </div>

            <button
                id="submitBtn"
                class="w-full py-4 rounded-xl bg-slate-200 text-slate-400 font-black uppercase tracking-widest text-sm transition-all"
                disabled
            >
                {% translate "Update Security Key" %}
            </button>
        </form>
    </div>
</div>

<script>
    const p1 = document.getElementById('id_new_password1');
    const p2 = document.getElementById('id_new_password2');
    const btn = document.getElementById('submitBtn');

    function validate() {
        const val = p1.value;
        const isLong = val.length >= 8;
        const hasUpper = /[A-Z]/.test(val);
        const matches = val === p2.value && val !== "";

        document.getElementById('length').style.color = isLong ? '#10b981' : '#94a3b8';
        document.getElementById('uppercase').style.color = hasUpper ? '#10b981' : '#94a3b8';

        if (isLong && hasUpper && matches) {
            btn.disabled = false;
            btn.className =
                "w-full py-4 rounded-xl btn-glow text-white font-black uppercase tracking-widest text-sm cursor-pointer";
        } else {
            btn.disabled = true;
            btn.className =
                "w-full py-4 rounded-xl bg-slate-200 text-slate-400 font-black uppercase tracking-widest text-sm";
        }
    }

    p1.addEventListener('input', validate);
    p2.addEventListener('input', validate);
</script>

{% endblock %}
